<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light only" />
    <title>{{ subject }}</title>
    <style>
      /* Email-safe reset */
      body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
      table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
      img { -ms-interpolation-mode: bicubic; }
      img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
      table { border-collapse: collapse !important; }
      body { margin: 0 !important; padding: 0 !important; width: 100% !important; }

      /* Design tokens mirrored from frontend app/globals.css */
      :root {
        --background: #f2f2f2;
        --foreground: #1e293b;
        --card: #f5f5f4;
        --card-foreground: #1e293b;
        --primary: #111fa2;
        --primary-foreground: #ffffff;
        --muted-foreground: #6b7280;
        --border: #d6d3d1;
        --radius: 20px;
      }

      .container {
        width: 100%;
        background: var(--background);
        padding: 28px 12px;
      }

      .card {
        width: 100%;
        max-width: 640px;
        margin: 0 auto;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .header {
        padding: 18px 22px;
        background: var(--primary);
        color: var(--primary-foreground);
      }

      .brand {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.2px;
        margin: 0;
      }

      .content {
        padding: 22px;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        color: var(--card-foreground);
      }

      .title {
        margin: 0 0 12px 0;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.25;
        color: var(--foreground);
      }

      .muted {
        color: var(--muted-foreground);
        font-size: 13px;
        line-height: 1.5;
        margin: 0;
      }

      .divider {
        height: 1px;
        background: var(--border);
        margin: 16px 0;
      }

      .kv {
        width: 100%;
      }

      .kv td {
        padding: 8px 0;
        vertical-align: top;
        font-size: 14px;
        line-height: 1.35;
      }

      .kv .k {
        width: 34%;
        color: var(--muted-foreground);
      }

      .kv .v {
        width: 66%;
        color: var(--foreground);
        font-weight: 600;
      }

      .buttonWrap {
        padding-top: 14px;
      }

      .button {
        display: inline-block;
        background: var(--primary);
        color: var(--primary-foreground) !important;
        text-decoration: none;
        padding: 12px 16px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 14px;
      }

      .footer {
        padding: 16px 22px 20px 22px;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        color: var(--muted-foreground);
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="header">
          <p class="brand">Incel HRM</p>
        </div>

        <div class="content">
          {% block content %}{% endblock %}
        </div>

        <div class="footer">
          <div class="divider"></div>
          <p class="muted">
            This is an automated notification from Incel HRM. If you believe you received this in error, you can ignore this email.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
