<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light only" />
    <title>{{ subject }}</title>
    <style>
      /* Email-safe reset */
      body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
      table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
      img { -ms-interpolation-mode: bicubic; }
      img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
      table { border-collapse: collapse !important; }
      body { margin: 0 !important; padding: 0 !important; width: 100% !important; }

      /*
        Email clients commonly do NOT support CSS variables (var(--x)).
        Keep styling to broadly-supported CSS so it renders consistently.
      */

      .container {
        width: 100%;
        background: #f2f2f2;
        padding: 28px 12px;
      }

      .card {
        width: 100%;
        max-width: 640px;
        margin: 0 auto;
        background: #f5f5f4;
        border: 1px solid #d6d3d1;
        border-radius: 20px;
        overflow: hidden;
      }

      .header {
        padding: 18px 22px;
        background: #111fa2;
        color: #ffffff;
      }

      .brand {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.2px;
        margin: 0;
      }

      .content {
        padding: 22px;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        color: #1e293b;
      }

      .title {
        margin: 0 0 12px 0;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.25;
        color: #1e293b;
      }

      .muted {
        color: #6b7280;
        font-size: 13px;
        line-height: 1.5;
        margin: 0;
      }

      .divider {
        height: 1px;
        background: #d6d3d1;
        margin: 16px 0;
      }

      .kv {
        width: 100%;
      }

      .kv td {
        padding: 8px 0;
        vertical-align: top;
        font-size: 14px;
        line-height: 1.35;
      }

      .kv .k {
        width: 34%;
        color: #6b7280;
      }

      .kv .v {
        width: 66%;
        color: #1e293b;
        font-weight: 600;
      }

      .buttonWrap {
        padding-top: 14px;
      }

      .button {
        display: inline-block;
        background: #111fa2;
        color: #ffffff !important;
        text-decoration: none;
        padding: 12px 16px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 14px;
      }

      .footer {
        padding: 16px 22px 20px 22px;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        color: #6b7280;
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="container" style="width:100%;background:#f2f2f2;padding:28px 12px;">
      <div class="card" style="width:100%;max-width:640px;margin:0 auto;background:#f5f5f4;border:1px solid #d6d3d1;border-radius:20px;overflow:hidden;">
        <div class="header" style="padding:18px 22px;background:#111fa2;color:#ffffff;">
          <p class="brand" style="font-family:ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;font-size:16px;font-weight:700;letter-spacing:0.2px;margin:0;">Incel HRM</p>
        </div>

        <div class="content" style="padding:22px;font-family:ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;color:#1e293b;">
          {% block content %}{% endblock %}
        </div>

        <div class="footer" style="padding:16px 22px 20px 22px;font-family:ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;color:#6b7280;font-size:12px;line-height:1.5;">
          <div class="divider" style="height:1px;background:#d6d3d1;margin:16px 0;"></div>
          <p class="muted" style="color:#6b7280;font-size:13px;line-height:1.5;margin:0;">
            This is an automated notification from Incel HRM. If you believe you received this in error, you can ignore this email.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
